global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Linux node exporters (add your servers here)
  - job_name: 'node'
    static_configs:
      - targets:
          - '10.0.1.10:9100'   # web-prod-01
          - '10.0.1.11:9100'   # api-prod-01
          - '10.0.1.30:9100'   # worker-01
    labels:
      env: production

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets:
          - '10.0.1.20:9187'

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets:
          - '10.0.1.21:9121'

  # Docker / cAdvisor
  - job_name: 'docker'
    static_configs:
      - targets:
          - '10.0.1.10:8080'   # cAdvisor on host

  # Kubernetes (if using kube-prometheus-stack)
  - job_name: 'kubernetes-nodes'
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)

  # Application metrics (any service exposing /metrics)
  - job_name: 'app'
    static_configs:
      - targets:
          - '10.0.1.11:9091'   # api-prod-01 app metrics
