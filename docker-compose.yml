version: '3.9'

services:
    # Laravel API Backend
    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: infra-topology-backend
        restart: unless-stopped
        environment:
            APP_ENV: production
            APP_KEY: ${APP_KEY}
            PROMETHEUS_URL: ${PROMETHEUS_URL:-http://prometheus:9090}
            PROMETHEUS_CACHE_TTL: 5
        ports:
            - "8000:8000"
        volumes:
            - backend-storage:/var/www/html/storage
        networks:
            - infra-net
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/servers"]
            interval: 30s
            timeout: 5s
            retries: 3

    # React Frontend
    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        container_name: infra-topology-frontend
        restart: unless-stopped
        environment:
            VITE_API_URL: http://localhost:8000/api/v1
            VITE_USE_MOCK: "false"
        ports:
            - "3000:80"
        depends_on:
            - backend
        networks:
            - infra-net

    # Prometheus (optional - connect to existing or use this)
    prometheus:
        image: prom/prometheus:v2.53.0
        container_name: infra-topology-prometheus
        restart: unless-stopped
        ports:
            - "9090:9090"
        volumes:
            - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus-data:/prometheus
        command:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--web.enable-lifecycle'
            - '--storage.tsdb.retention.time=30d'
        networks:
            - infra-net
        profiles: ["with-prometheus"]

volumes:
    backend-storage:
    prometheus-data:

networks:
    infra-net:
        driver: bridge
